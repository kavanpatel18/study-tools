<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Countdown — Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020c14;
    --panel: #050f1a;
    --green: #00ff9d;
    --green-dim: #00994d;
    --green-faint: rgba(0,255,157,0.06);
    --amber: #ffb700;
    --red: #ff3b5c;
    --blue: #00cfff;
    --text: #c8f0e0;
    --muted: #3a6050;
    --border: rgba(0,255,157,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Grid bg */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* HEADER */
  .sys-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
    margin-bottom: 2rem;
  }

  .sys-logo {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--green);
    text-shadow: 0 0 12px var(--green);
  }

  .sys-status {
    font-size: 0.65rem;
    color: var(--green-dim);
    letter-spacing: 0.15em;
  }

  .blink { animation: blink 1.2s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* MAIN TITLE */
  .main-title {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .main-title h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 30px rgba(0,255,157,0.5), 0 0 60px rgba(0,255,157,0.2);
    letter-spacing: 0.1em;
    line-height: 1.2;
  }

  .main-title p {
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    margin-top: 0.5rem;
    text-transform: uppercase;
  }

  /* ADD EXAM PANEL */
  .add-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 2rem;
    position: relative;
  }

  .add-panel::before {
    content: '// ADD TARGET';
    position: absolute;
    top: -0.6rem;
    left: 1rem;
    background: var(--panel);
    padding: 0 0.5rem;
    font-size: 0.65rem;
    color: var(--green);
    letter-spacing: 0.15em;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 0.75rem;
    align-items: end;
  }

  .field label {
    display: block;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .field input {
    width: 100%;
    background: rgba(0,255,157,0.04);
    border: 1px solid var(--border);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(0,255,157,0.15);
  }

  .field input::placeholder { color: var(--muted); }

  .add-btn {
    background: var(--green);
    color: var(--bg);
    border: none;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.65rem 1.2rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .add-btn:hover {
    background: #fff;
    box-shadow: 0 0 20px rgba(0,255,157,0.5);
  }

  /* COUNTDOWN CARDS */
  .cards-grid {
    display: grid;
    gap: 1rem;
  }

  .exam-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease;
    transition: border-color 0.3s;
  }

  .exam-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
  }

  .exam-card.urgent { border-color: rgba(255,59,92,0.4); }
  .exam-card.urgent::before { background: var(--red); box-shadow: 0 0 10px var(--red); }
  .exam-card.warning { border-color: rgba(255,183,0,0.3); }
  .exam-card.warning::before { background: var(--amber); box-shadow: 0 0 10px var(--amber); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.2rem;
  }

  .exam-name {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 8px rgba(0,255,157,0.3);
  }

  .exam-card.urgent .exam-name { color: var(--red); text-shadow: 0 0 8px rgba(255,59,92,0.3); }
  .exam-card.warning .exam-name { color: var(--amber); text-shadow: 0 0 8px rgba(255,183,0,0.3); }

  .delete-btn {
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }

  .delete-btn:hover { border-color: var(--red); color: var(--red); }

  .countdown-display {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .time-unit {
    text-align: center;
    background: var(--green-faint);
    border: 1px solid rgba(0,255,157,0.08);
    padding: 0.75rem 0.5rem 0.5rem;
  }

  .exam-card.urgent .time-unit { background: rgba(255,59,92,0.05); border-color: rgba(255,59,92,0.1); }
  .exam-card.warning .time-unit { background: rgba(255,183,0,0.05); border-color: rgba(255,183,0,0.1); }

  .time-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--green);
    line-height: 1;
    display: block;
  }

  .exam-card.urgent .time-value { color: var(--red); }
  .exam-card.warning .time-value { color: var(--amber); }

  .time-label {
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: block;
    margin-top: 0.3rem;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .prog-track {
    flex: 1;
    height: 3px;
    background: rgba(0,255,157,0.08);
    position: relative;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    box-shadow: 0 0 6px var(--green);
    transition: width 1s linear;
  }

  .exam-card.urgent .prog-fill { background: linear-gradient(90deg, #991f35, var(--red)); box-shadow: 0 0 6px var(--red); }
  .exam-card.warning .prog-fill { background: linear-gradient(90deg, #8c6300, var(--amber)); box-shadow: 0 0 6px var(--amber); }

  .prog-pct {
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .exam-date-str {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.6rem;
    letter-spacing: 0.1em;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    border: 1px dashed var(--border);
    color: var(--muted);
  }

  .empty-state .big { font-family: 'Orbitron', monospace; font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.3; }
  .empty-state p { font-size: 0.75rem; letter-spacing: 0.15em; }

  /* SYSTEM STATS */
  .sys-bar {
    display: flex;
    gap: 2rem;
    padding: 0.75rem 0;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .sys-stat { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }
  .sys-stat span { color: var(--green); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: var(--bg);
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.7rem 1.5rem;
    transition: transform 0.3s ease;
    z-index: 9999;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 580px) {
    .form-row { grid-template-columns: 1fr; }
    .countdown-display { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="sys-header">
    <div class="sys-logo">◈ EXAM MISSION CONTROL</div>
    <div class="sys-status">SYS STATUS: ONLINE <span class="blink">█</span></div>
  </div>

  <div class="main-title">
    <h1>COUNTDOWN<br>TO ZERO</h1>
    <p>Track every exam. Miss nothing.</p>
  </div>

  <div class="add-panel">
    <div class="form-row">
      <div class="field">
        <label>Exam Name</label>
        <input type="text" id="examName" placeholder="e.g. Organic Chemistry" maxlength="40">
      </div>
      <div class="field">
        <label>Exam Date & Time</label>
        <input type="datetime-local" id="examDate">
      </div>
      <button class="add-btn" onclick="addExam()">+ ADD TARGET</button>
    </div>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <div class="empty-state" id="emptyState">
      <div class="big">◌</div>
      <p>NO TARGETS LOCKED<br>ADD YOUR FIRST EXAM ABOVE</p>
    </div>
  </div>

  <div class="sys-bar">
    <div class="sys-stat">EXAMS TRACKED: <span id="statTotal">0</span></div>
    <div class="sys-stat">NEXT EXAM: <span id="statNext">—</span></div>
    <div class="sys-stat">LOCAL TIME: <span id="statTime">—</span></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let exams = JSON.parse(localStorage.getItem('examTargets') || '[]');
  let intervals = {};

  function save() {
    localStorage.setItem('examTargets', JSON.stringify(exams));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function addExam() {
    const name = document.getElementById('examName').value.trim();
    const date = document.getElementById('examDate').value;
    if (!name || !date) { showToast('⚠ ENTER EXAM NAME AND DATE'); return; }
    const target = new Date(date);
    if (target <= new Date()) { showToast('⚠ DATE MUST BE IN THE FUTURE'); return; }
    const exam = { id: Date.now(), name, date };
    exams.push(exam);
    exams.sort((a, b) => new Date(a.date) - new Date(b.date));
    save();
    document.getElementById('examName').value = '';
    document.getElementById('examDate').value = '';
    renderAll();
    showToast('TARGET LOCKED: ' + name.toUpperCase());
  }

  function removeExam(id) {
    if (intervals[id]) clearInterval(intervals[id]);
    exams = exams.filter(e => e.id !== id);
    save();
    renderAll();
  }

  function getUrgency(msLeft) {
    const days = msLeft / 86400000;
    if (days <= 3) return 'urgent';
    if (days <= 7) return 'warning';
    return '';
  }

  function formatCountdown(ms) {
    if (ms <= 0) return { d:'00', h:'00', m:'00', s:'00' };
    const s = Math.floor(ms / 1000) % 60;
    const m = Math.floor(ms / 60000) % 60;
    const h = Math.floor(ms / 3600000) % 24;
    const d = Math.floor(ms / 86400000);
    return {
      d: String(d).padStart(2, '0'),
      h: String(h).padStart(2, '0'),
      m: String(m).padStart(2, '0'),
      s: String(s).padStart(2, '0')
    };
  }

  function renderAll() {
    Object.values(intervals).forEach(clearInterval);
    intervals = {};
    const grid = document.getElementById('cardsGrid');
    const empty = document.getElementById('emptyState');

    // Clear old cards
    [...grid.querySelectorAll('.exam-card')].forEach(el => el.remove());

    if (exams.length === 0) {
      empty.style.display = 'block';
      updateStats();
      return;
    }
    empty.style.display = 'none';

    exams.forEach(exam => {
      const card = document.createElement('div');
      card.className = 'exam-card';
      card.id = 'card-' + exam.id;

      const target = new Date(exam.date);
      const created = exam.id; // use id as creation timestamp proxy
      const totalMs = target - created;
      const dateStr = target.toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });

      card.innerHTML = `
        <div class="card-top">
          <div class="exam-name">${exam.name.toUpperCase()}</div>
          <button class="delete-btn" onclick="removeExam(${exam.id})">REMOVE</button>
        </div>
        <div class="countdown-display">
          <div class="time-unit"><span class="time-value" id="d-${exam.id}">00</span><span class="time-label">Days</span></div>
          <div class="time-unit"><span class="time-value" id="h-${exam.id}">00</span><span class="time-label">Hours</span></div>
          <div class="time-unit"><span class="time-value" id="m-${exam.id}">00</span><span class="time-label">Mins</span></div>
          <div class="time-unit"><span class="time-value" id="s-${exam.id}">00</span><span class="time-label">Secs</span></div>
        </div>
        <div class="progress-row">
          <div class="prog-track"><div class="prog-fill" id="pf-${exam.id}" style="width:0%"></div></div>
          <div class="prog-pct" id="pp-${exam.id}">0% elapsed</div>
        </div>
        <div class="exam-date-str">TARGET: ${dateStr.toUpperCase()}</div>
      `;

      grid.appendChild(card);

      function tick() {
        const now = new Date();
        const msLeft = target - now;
        const msElapsed = now - created;
        const pct = Math.min(100, Math.max(0, (msElapsed / (totalMs || 1)) * 100));
        const urgency = getUrgency(msLeft);
        const cardEl = document.getElementById('card-' + exam.id);
        if (cardEl) {
          cardEl.className = 'exam-card ' + urgency;
        }

        if (msLeft <= 0) {
          ['d','h','m','s'].forEach(u => {
            const el = document.getElementById(u + '-' + exam.id);
            if (el) el.textContent = '00';
          });
          const pf = document.getElementById('pf-' + exam.id);
          if (pf) pf.style.width = '100%';
          const pp = document.getElementById('pp-' + exam.id);
          if (pp) pp.textContent = 'EXAM TIME';
          return;
        }

        const t = formatCountdown(msLeft);
        const dEl = document.getElementById('d-' + exam.id);
        const hEl = document.getElementById('h-' + exam.id);
        const mEl = document.getElementById('m-' + exam.id);
        const sEl = document.getElementById('s-' + exam.id);
        if (dEl) dEl.textContent = t.d;
        if (hEl) hEl.textContent = t.h;
        if (mEl) mEl.textContent = t.m;
        if (sEl) sEl.textContent = t.s;

        const pf = document.getElementById('pf-' + exam.id);
        if (pf) pf.style.width = pct.toFixed(1) + '%';
        const pp = document.getElementById('pp-' + exam.id);
        if (pp) pp.textContent = pct.toFixed(0) + '% elapsed';
      }

      tick();
      intervals[exam.id] = setInterval(tick, 1000);
    });

    updateStats();
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = exams.length;
    if (exams.length > 0) {
      const next = exams[0];
      const d = Math.ceil((new Date(next.date) - new Date()) / 86400000);
      document.getElementById('statNext').textContent = next.name.toUpperCase() + ' (' + Math.max(0,d) + 'D)';
    } else {
      document.getElementById('statNext').textContent = '—';
    }
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('statTime').textContent = now.toLocaleTimeString('en-GB', { hour12: false });
  }

  // Set min date to now
  const nowInput = new Date();
  nowInput.setMinutes(nowInput.getMinutes() + 1);
  document.getElementById('examDate').min = nowInput.toISOString().slice(0,16);

  renderAll();
  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
